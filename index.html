<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Election Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="hero">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        
        <div class="glass-card hero-content">
            <div class="logo-container">
                <img src="assets/images/UCSC_logo.png" alt="UCSC Logo" class="hero-logo">
            </div>
            <h1>UCSC Election Portal</h1>
            <p>Experience the next generation of campus democracy. Secure, transparent, and built for the modern student.</p>
            <div class="hero-actions">
                <a href="pages/login.html" class="btn-primary">Get Started <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>

        <div class="scroll-indicator">
            <span>Scroll to explore</span>
            <div class="mouse">
                <div class="wheel"></div>
            </div>
        </div>
    </header>

    <script src="js/script.js"></script>
</body>
</html>
