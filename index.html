<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Election Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="assets/images/UCSC_logo.png" alt="UCSC Logo">
                <span>UCSC Portal</span>
            </div>
            <div class="nav-actions">
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        
        <div class="glass-card hero-content">
            <div class="logo-container">
                <img src="assets/images/UCSC_logo.png" alt="UCSC Logo" class="hero-logo">
            </div>
            <h1>UCSC Election Portal</h1>
            <p>The power to lead is in your hands. Cast your vote to elect the next Student Representative of your batch.</p>
            <div class="hero-actions">
                <a href="pages/login.html" class="btn-primary">Vote Now <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>

        <div class="hero-footer">
            <span>&copy; 2026 UCSC Election</span>
        </div>

    </header>

    <script src="js/script.js"></script>
</body>
</html>
