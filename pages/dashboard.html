<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .election-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .election-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            border: 1px solid #f3f4f6;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .election-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .status-active { background: #dcfce7; color: #166534; }
        .status-upcoming { background: #e0f2fe; color: #075985; }
    </style>
</head>
<body class="dashboard-body">
    
    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Student Dashboard</h1>
                <p>Welcome to the UCSC Election Portal</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span id="user-id" class="user-id">ID: Loading...</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-graduate"></i>
                </div>
            </div>
        </header>

        <section class="dashboard-section">
            <h2 class="section-title">Active Elections</h2>
            <div id="active-elections-container" class="election-list-grid">
                <p style="color: #6b7280; grid-column: 1/-1;">Loading elections...</p>
            </div>
        </section>

        <div class="dashboard-grid" style="margin-top: 2rem;">
            <!-- Quick Actions -->
            <section class="dashboard-section">
                <h2 class="section-title">Quick Actions</h2>
                <div class="card" style="display: grid; gap: 1rem;">
                    <a href="nominate.html" class="nav-link" style="background: #f9fafb; padding: 1rem; border-radius: 0.5rem; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 1rem;">
                        <i class="fas fa-user-plus" style="color: var(--primary); font-size: 1.2rem;"></i>
                        <div>
                            <div style="font-weight: 600;">Submit Nomination</div>
                            <div style="font-size: 0.8rem; color: #6b7280;">Apply for a position</div>
                        </div>
                    </a>
                    <a href="admin-results.html" class="nav-link" style="background: #f9fafb; padding: 1rem; border-radius: 0.5rem; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 1rem;">
                        <i class="fas fa-chart-bar" style="color: var(--primary); font-size: 1.2rem;"></i>
                        <div>
                            <div style="font-weight: 600;">View Results</div>
                            <div style="font-size: 0.8rem; color: #6b7280;">See live standings</div>
                        </div>
                    </a>
                </div>
            </section>

            <!-- My Info -->
            <section class="dashboard-section">
                <h2 class="section-title">My Status</h2>
                <div class="card">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                        <div style="width: 50px; height: 50px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem;">
                            <i class="fas fa-id-card"></i>
                        </div>
                        <div>
                            <h3 style="margin: 0;" id="status-name">Student</h3>
                            <p style="margin: 0; color: #6b7280;" id="status-dept">Department</p>
                        </div>
                    </div>
                    <div style="padding: 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; color: #166534; font-size: 0.9rem;">
                        <i class="fas fa-check-circle"></i> Your account is active and eligible to vote.
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';

        async function initDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-id').textContent = user.student_id;
            document.getElementById('status-name').textContent = user.name;
            document.getElementById('status-dept').textContent = user.student_id.includes('CS') ? 'Computer Science' : 'Information Systems';

            loadActiveElections();
        }

        async function loadActiveElections() {
            try {
                const res = await fetch(`${API_BASE}/admin/elections`, { 
                    headers: { 'x-student-id': JSON.parse(localStorage.getItem('user')).student_id },
                    credentials: 'include' 
                });
                const elections = await res.json();
                
                const activeElections = elections.filter(e => e.status === 'active' || e.status === 'upcoming' || e.status === 'completed');
                const container = document.getElementById('active-elections-container');
                
                if (activeElections.length === 0) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #6b7280; padding: 2rem;">No active elections at the moment.</p>';
                    return;
                }

                container.innerHTML = activeElections.map(e => {
                    const now = new Date();
                    const start = new Date(e.start_time);
                    const end = new Date(e.end_time);
                    const nomStart = e.nomination_start ? new Date(e.nomination_start) : null;
                    const nomEnd = e.nomination_end ? new Date(e.nomination_end) : null;

                    let statusText = e.status;
                    let statusClass = `status-${e.status}`;
                    let actionBtn = '';

                    // Check if in nomination phase
                    const isNominationPhase = e.has_nominations && nomStart && nomEnd && now >= nomStart && now <= nomEnd;
                    
                    if (isNominationPhase) {
                        statusText = 'Nomination Phase';
                        statusClass = 'status-upcoming'; // Reuse blue color
                        actionBtn = `<a href="nominate.html?election_id=${e.id}" class="btn-sleek" style="text-align: center; display: block; text-decoration: none; background: var(--primary);">Nominate</a>`;
                    } else if (e.status === 'active') {
                        actionBtn = `<a href="vote.html?election_id=${e.id}" class="btn-sleek" style="text-align: center; display: block; text-decoration: none;">Vote Now</a>`;
                    } else if (e.status === 'upcoming') {
                        actionBtn = `<button class="btn-sleek" disabled style="opacity: 0.5; cursor: not-allowed; width: 100%;">Starts Soon</button>`;
                    } else if (e.status === 'completed') {
                        actionBtn = `<a href="admin-results.html?election_id=${e.id}" class="btn-sleek" style="text-align: center; display: block; text-decoration: none; background: #4b5563;">View Results</a>`;
                    }

                    return `
                        <div class="election-card">
                            <div>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                                <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem;">${e.title}</h3>
                                <p style="font-size: 0.85rem; color: #6b7280; margin-bottom: 1.5rem;">
                                    <i class="far fa-calendar"></i> Voting: ${start.toLocaleDateString()}
                                </p>
                            </div>
                            ${actionBtn}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading elections:', err);
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
