<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../js/highcharts.js"></script>
    <script src="../js/highcharts-3d.js"></script>
    <style>
        .position-section {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .position-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        .candidate-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .erc-candidate-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
        }
        .erc-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #64748b;
            flex-shrink: 0;
        }
        .erc-candidate-info { flex-grow: 1; }
        .erc-candidate-name { font-weight: 700; color: #1e293b; }
        .erc-vote-count { font-weight: 600; color: #64748b; font-size: 0.9rem; }
        .erc-leading-badge {
            background: #dcfce7;
            color: #166534;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="dashboard-body">
    
    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>ELECTION RESULTS</h1>
                <p>Real-time voting analytics & distribution</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span id="user-id" class="user-id">ID: Loading...</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <div class="election-results-card">
            <div class="erc-header">
                <div class="erc-title-group">
                    <h2 id="erc-election-title">Loading Election...</h2>
                    <p id="erc-position-subtitle">Fetching status...</p>
                </div>
                <div id="erc-status-badge" class="erc-status-badge">
                    <span>--</span>
                </div>
            </div>

            <div class="erc-stats-row">
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Total votes</span>
                    <span id="erc-total-votes" class="erc-stat-value">0</span>
                </div>
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Turnout</span>
                    <span id="erc-turnout" class="erc-stat-value">0%</span>
                </div>
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Time left</span>
                    <span id="erc-time-left" class="erc-stat-value">--:--:--</span>
                </div>
            </div>

            <div id="positions-container">
                <!-- Position-wise results will be injected here -->
            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        const designColors = ['#378ADD', '#7F77DD', '#1D9E75', '#EF9F27', '#E11D48', '#D97706'];
        let electionId = null;
        let electionData = null;

        async function authFetch(url, options = {}) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers,
                'x-admin-id': user.student_id
            };
            return fetch(url, { ...options, headers: headers, credentials: 'include' });
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            electionId = urlParams.get('id');

            if (!electionId) {
                alert('No election ID provided.');
                window.location.href = 'admin-elections-list.html';
                return;
            }

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('user-name').textContent = user.name || 'Admin';
            document.getElementById('user-id').textContent = 'ID: ' + (user.student_id || 'N/A');

            await fetchAllData();
            setInterval(fetchAllData, 10000);
            setInterval(updateCountdown, 1000);
        }

        async function fetchAllData() {
            try {
                const [electionRes, resultsRes, statsRes] = await Promise.all([
                    authFetch(`${API_BASE}/admin/elections/${electionId}`),
                    authFetch(`${API_BASE}/results?election_id=${electionId}`),
                    authFetch(`${API_BASE}/admin/stats?election_id=${electionId}`)
                ]);

                if (electionRes.ok && resultsRes.ok && statsRes.ok) {
                    electionData = await electionRes.json();
                    const results = await resultsRes.json();
                    const stats = await statsRes.json();
                    renderUI(electionData, results, stats);
                }
            } catch (err) {
                console.error('Error fetching data:', err);
            }
        }

        function renderUI(election, results, stats) {
            document.getElementById('erc-election-title').textContent = election.title;
            const turnout = stats.total > 0 ? ((stats.voted / stats.total) * 100).toFixed(1) : 0;
            document.getElementById('erc-total-votes').textContent = stats.voted;
            document.getElementById('erc-turnout').textContent = turnout + '%';
            
            const statusBadge = document.getElementById('erc-status-badge');
            statusBadge.textContent = election.status.toUpperCase();
            statusBadge.className = `erc-status-badge status-${election.status}`;
            
            document.getElementById('erc-position-subtitle').textContent = `Status: ${election.status}`;

            // Group results by position
            const grouped = {};
            results.forEach(r => {
                if (!grouped[r.position]) grouped[r.position] = [];
                grouped[r.position].push(r);
            });

            const container = document.getElementById('positions-container');
            container.innerHTML = '';

            Object.entries(grouped).forEach(([position, candidates], index) => {
                const posId = `pos-${index}`;
                const section = document.createElement('div');
                section.className = 'position-section';
                section.innerHTML = `
                    <h3 class="position-title"><i class="fas fa-vote-yea"></i> ${position}</h3>
                    <div class="charts-grid">
                        <div id="${posId}-chart" style="height: 350px;"></div>
                        <div class="candidate-list" id="${posId}-list"></div>
                    </div>
                `;
                container.appendChild(section);

                renderPieChart(`${posId}-chart`, position, candidates);
                renderCandidateList(`${posId}-list`, candidates);
            });
        }

        function renderPieChart(containerId, title, candidates) {
            const data = candidates.map((c, i) => ({
                name: c.name,
                y: c.vote_count,
                color: designColors[i % designColors.length]
            }));

            Highcharts.chart(containerId, {
                chart: {
                    type: 'pie',
                    options3d: {
                        enabled: true,
                        alpha: 45,
                        beta: 0
                    },
                    backgroundColor: 'transparent'
                },
                title: { text: '' },
                tooltip: { pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>' },
                plotOptions: {
                    pie: {
                        allowPointSelect: true,
                        cursor: 'pointer',
                        depth: 35,
                        innerSize: 100,
                        dataLabels: {
                            enabled: true,
                            format: '<b>{point.name}</b>: {point.percentage:.1f}%'
                        }
                    }
                },
                series: [{
                    name: 'Votes',
                    data: data
                }],
                credits: { enabled: false }
            });
        }

        function renderCandidateList(containerId, candidates) {
            const sorted = [...candidates].sort((a,b) => b.vote_count - a.vote_count);
            const container = document.getElementById(containerId);
            const totalPosVotes = sorted.reduce((s, c) => s + c.vote_count, 0);

            container.innerHTML = sorted.map((c, i) => {
                const isLeading = i === 0 && c.vote_count > 0;
                const pct = totalPosVotes > 0 ? ((c.vote_count / totalPosVotes) * 100).toFixed(1) : 0;
                return `
                    <div class="erc-candidate-item">
                        <div class="erc-avatar" style="overflow: hidden;">
                            ${c.photo ? `<img src="${c.photo}" style="width:100%; height:100%; object-fit:cover;">` : c.name.charAt(0)}
                        </div>
                        <div class="erc-candidate-info">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="erc-candidate-name">${c.name}</span>
                                ${isLeading ? '<span class="erc-leading-badge">Leading</span>' : ''}
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 0.25rem;">
                                <span class="erc-vote-count">${c.vote_count} votes (${pct}%)</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCountdown() {
            const timerEl = document.getElementById('erc-time-left');
            if (!electionData || !electionData.end_time) return;

            const end = new Date(electionData.end_time).getTime();
            const now = new Date().getTime();
            const dist = end - now;

            if (dist < 0) {
                timerEl.textContent = 'ENDED';
                return;
            }

            const hours = Math.floor(dist / (1000 * 60 * 60));
            const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((dist % (1000 * 60)) / 1000);

            timerEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
