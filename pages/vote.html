<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Simple Modal Style */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 1rem;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        .countdown-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 600;
        }
        .confirmation-card {
            text-align: center;
            padding: 3rem;
        }
        .vote-id-badge {
            background: #f3f4f6;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--primary);
            margin: 1rem 0;
            display: inline-block;
        }
        
        /* Ensure Candidate Cards are centered */
        .candidate-card {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            text-align: center !important;
            justify-content: center !important;
        }
        
        .candidate-card * {
            text-align: center !important;
        }

        .vote-limits-banner {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .limit-badge {
            background: white;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        .limit-badge span {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
        }
        .limit-badge div {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body class="dashboard-body">
    
    <!-- Sidebar -->
    <aside class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Cast Your Vote</h1>
                <p id="election-title-header">Select your preferred candidate</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span id="user-id" class="user-id">ID: Loading...</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <!-- Countdown Timer -->
        <div id="countdown-timer" class="countdown-banner" style="display: none;">
            Voting ends in: <span id="time-left">--:--:--</span>
        </div>

        <!-- Vote Limits Banner -->
        <div id="vote-limits-container" class="vote-limits-banner">
            <div class="limit-badge">
                <span>CS Candidates</span>
                <div id="cs-votes-left">0 / 0</div>
            </div>
            <div class="limit-badge">
                <span>IS Candidates</span>
                <div id="is-votes-left">0 / 0</div>
            </div>
        </div>

        <div id="candidate-container" class="candidate-grid">
            <!-- Dynamic candidates will be loaded here -->
            <p>Loading candidates...</p>
        </div>
    </main>

    <!-- Candidate Detail Modal -->
    <div id="candidateModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <span class="close-modal">&times;</span>
            <div style="margin-bottom: 1.5rem;">
                <div id="modal-photo" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem; display: flex; justify-content: center;">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h2 id="modal-name" style="font-weight: 700;">Candidate Name</h2>
                <div id="modal-category-tag" style="margin-top: 0.5rem; color: var(--primary); font-size: 0.8rem; background: #e0e7ff; padding: 0.2rem 0.5rem; border-radius: 1rem; display: inline-block;">Category</div>
            </div>
            
            <!-- Manifesto Section -->
            <div style="margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center;">
                <h4 style="color: var(--primary); margin-bottom: 0.5rem; font-weight: 600;">Manifesto</h4>
                <p id="modal-manifesto" style="color: #1a1a18; line-height: 1.6; max-width: 90%;">Full manifesto text...</p>
            </div>
            
            <!-- Language Proficiency Section -->
            <div style="margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center;">
                <h4 style="color: var(--primary); margin-bottom: 0.5rem; font-weight: 600;">Language Proficiency</h4>
                <p id="modal-lang" style="color: #1a1a18; line-height: 1.6; max-width: 90%;">Languages...</p>
            </div>
            
            <button id="modal-vote-btn" class="btn-sleek" style="width: 100%; font-weight: 700;">Cast Vote</button>
        </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        let currentCandidateId = null;
        let currentElectionId = null;
        let myVotes = [];
        let electionDetails = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentElectionId = urlParams.get('election_id');

            if (!currentElectionId) {
                alert('No election specified.');
                window.location.href = 'home.html';
                return;
            }

            const container = document.getElementById('candidate-container');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            await refreshData();
        });

        async function refreshData() {
            const user = JSON.parse(localStorage.getItem('user'));
            const isVotingOpen = await startCountdown();
            if (!isVotingOpen) return;

            try {
                // Fetch my votes
                const votesRes = await fetch(`${API_BASE}/vote/my-votes?election_id=${currentElectionId}&student_id=${user.student_id}`, { credentials: 'include' });
                myVotes = await votesRes.json();

                // Update Limits UI
                updateLimitsUI();

                // Fetch candidates
                const response = await fetch(`${API_BASE}/candidates?election_id=${currentElectionId}`, { credentials: 'include' });
                const candidates = await response.json();

                renderCandidates(candidates);
            } catch (err) {
                console.error(err);
            }
        }

        function updateLimitsUI() {
            const csVotes = myVotes.filter(v => v.category === 'CS').length;
            const isVotes = myVotes.filter(v => v.category === 'IS').length;

            document.getElementById('cs-votes-left').textContent = `${csVotes} / ${electionDetails.cs_vote_limit}`;
            document.getElementById('is-votes-left').textContent = `${isVotes} / ${electionDetails.is_vote_limit}`;
        }

        function renderCandidates(candidates) {
            const container = document.getElementById('candidate-container');
            container.innerHTML = '';
            
            if (candidates.length === 0) {
                container.innerHTML = `<p>No candidates found for this election.</p>`;
                return;
            }

            candidates.forEach(cand => {
                const hasVotedForThis = myVotes.some(v => v.id === cand.id);
                
                const card = document.createElement('div');
                card.className = 'card candidate-card';
                card.style.cursor = 'pointer';
                
                if (hasVotedForThis) {
                    card.style.border = '2px solid var(--success)';
                }

                card.innerHTML = `
                    <div class="candidate-img">
                        ${cand.photo ? `<img src="${cand.photo}" style="width: 100%; height: 100%; object-fit: cover;">` : '<i class="fas fa-user"></i>'}
                    </div>
                    <h3 class="candidate-name">${cand.name}</h3>
                    <p class="manifesto" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 3em;">${cand.manifesto}</p>
                    <div style="margin-top: 1rem; color: var(--primary); font-size: 0.8rem; background: #e0e7ff; padding: 0.2rem 0.5rem; border-radius: 1rem; display: inline-block;">${cand.category} Candidate</div>
                    ${hasVotedForThis ? '<p style="color: var(--success); font-size: 0.8rem; margin-top: 0.5rem; font-weight: 700;"><i class="fas fa-check-circle"></i> You voted for this candidate</p>' : ''}
                    <div style="margin-top: 0.5rem; color: var(--primary); font-size: 0.9rem;">Click to view details</div>
                `;
                card.onclick = () => openModal(cand);
                container.appendChild(card);
            });
        }

        async function startCountdown() {
            try {
                const res = await fetch(`${API_BASE}/admin/elections/${currentElectionId}`, { credentials: 'include' });
                if (!res.ok) throw new Error('Election not found');
                electionDetails = await res.json();
                
                document.getElementById('election-title-header').innerText = `Vote for: ${electionDetails.title}`;

                if (electionDetails.status !== 'active') {
                    document.getElementById('candidate-container').innerHTML = `
                        <div class="card" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                            <i class="fas fa-lock" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;"></i>
                            <h3>Voting is currently closed</h3>
                            <p style="color: var(--text-muted); margin-top: 0.5rem;">This election is not accepting votes right now.</p>
                        </div>
                    `;
                    document.getElementById('vote-limits-container').style.display = 'none';
                    return false;
                }

                const deadline = new Date(electionDetails.end_time).getTime();
                const now = new Date().getTime();
                
                if (deadline - now < 0) {
                    document.getElementById('candidate-container').innerHTML = `
                        <div class="card" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                            <i class="fas fa-clock" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;"></i>
                            <h3>Voting has ended</h3>
                            <p style="color: var(--text-muted); margin-top: 0.5rem;">The election period is over.</p>
                            <a href="results.html" class="btn-sleek" style="display: inline-block; margin-top: 1.5rem;">View Results</a>
                        </div>
                    `;
                    document.getElementById('vote-limits-container').style.display = 'none';
                    return false;
                }

                const timerElement = document.getElementById('countdown-timer');
                const timeLeftElement = document.getElementById('time-left');
                
                timerElement.style.display = 'block';

                const timerFunc = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = deadline - now;

                    if (distance < 0) {
                        clearInterval(timerFunc);
                        timeLeftElement.innerHTML = "EXPIRED";
                        location.reload(); 
                        return;
                    }

                    timeLeftElement.innerHTML = formatDistance(distance);
                }, 1000);

                return true;

            } catch (err) { 
                console.error('Timer error', err);
                document.getElementById('candidate-container').innerHTML = '<p>Error loading election details.</p>';
                return false;
            }
        }

        function formatDistance(distance) {
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            let res = [];
            if (days > 0) res.push(`${days} day${days > 1 ? 's' : ''}`);
            if (hours > 0) res.push(`${hours} hour${hours > 1 ? 's' : ''}`);
            if (minutes > 0) res.push(`${minutes} minute${minutes > 1 ? 's' : ''}`);
            if (seconds > 0 || res.length === 0) res.push(`${seconds} second${seconds > 1 ? 's' : ''}`);
            
            return res.join(' ');
        }

        function openModal(cand) {
            currentCandidateId = cand.id;
            const hasVotedForThis = myVotes.some(v => v.id === cand.id);
            const csVotes = myVotes.filter(v => v.category === 'CS').length;
            const isVotes = myVotes.filter(v => v.category === 'IS').length;
            const limit = cand.category === 'CS' ? electionDetails.cs_vote_limit : electionDetails.is_vote_limit;
            const currentCount = cand.category === 'CS' ? csVotes : isVotes;

            document.getElementById('modal-name').innerText = cand.name;
            document.getElementById('modal-manifesto').innerText = cand.manifesto;
            document.getElementById('modal-lang').innerText = cand.language_proficiency || 'Not specified';
            document.getElementById('modal-category-tag').innerText = `${cand.category} Candidate`;

            const modalPhoto = document.getElementById('modal-photo');
            modalPhoto.innerHTML = cand.photo ? `<img src="${cand.photo}" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">` : '<i class="fas fa-user-circle"></i>';

            const voteBtn = document.getElementById('modal-vote-btn');
            if (hasVotedForThis) {
                voteBtn.innerText = 'Already Voted';
                voteBtn.disabled = true;
                voteBtn.style.background = '#10b981';
            } else if (currentCount >= limit) {
                voteBtn.innerText = `Limit reached for ${cand.category}`;
                voteBtn.disabled = true;
                voteBtn.style.background = '#9ca3af';
            } else {
                voteBtn.innerText = 'Cast Vote';
                voteBtn.disabled = false;
                voteBtn.style.background = 'var(--primary)';
                voteBtn.onclick = () => {
                    if (confirm(`Confirm vote for ${cand.name}?`)) {
                        submitVote(cand.id);
                    }
                };
            }

            document.getElementById('candidateModal').style.display = 'block';
        }

        document.querySelector('.close-modal').onclick = () => {
            document.getElementById('candidateModal').style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target == document.getElementById('candidateModal')) {
                document.getElementById('candidateModal').style.display = 'none';
            }
        };

        async function submitVote(candidate_id) {
            const user = JSON.parse(localStorage.getItem('user'));
            try {
                const res = await fetch(`${API_BASE}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        election_id: currentElectionId,
                        student_id: user.student_id, 
                        candidate_id 
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('candidateModal').style.display = 'none';
                    // Instead of full confirmation screen immediately, we might want to refresh to allow more votes?
                    // User said "student #341 can vote #IScand12 and #IScand55 and #CScand98 and #CScand 75"
                    // So they should be able to continue voting until limits are reached.
                    alert('Vote cast successfully!');
                    await refreshData();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Failed to submit vote.');
            }
        }
    </script>
</body>
</html>
