<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <img src="../assets/images/UCSC_logo.png" alt="UCSC Logo">
            </div>
            <span>UCSC Portal</span>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="admin-dashboard.html" class="nav-link admin-only" style="display: none;">
                <i class="fas fa-user-shield"></i>
                <span>Admin Dashboard</span>
            </a>
            <a href="vote.html" class="nav-link active">
                <i class="fas fa-vote-yea"></i>
                <span>Cast Vote</span>
            </a>
            <a href="results.html" class="nav-link">
                <i class="fas fa-chart-bar"></i>
                <span>Live Results</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="logout-btn" class="nav-link logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Cast Your Vote</h1>
                <p>Select your preferred candidate</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="user-role">Student</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <div id="candidate-container" class="candidate-grid">
            <!-- Dynamic candidates will be loaded here -->
            <p>Loading candidates...</p>
        </div>
    </main>

    <script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('candidate-container');
            const user = JSON.parse(localStorage.getItem('user'));

            if (user && user.has_voted) {
                container.innerHTML = `
                    <div class="card" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success); margin-bottom: 1rem;"></i>
                        <h3>You have already voted!</h3>
                        <p style="color: var(--text-muted); margin-top: 0.5rem;">Thank you for participating in the election.</p>
                        <button class="btn-sleek" style="margin-top: 1.5rem;" onclick="window.location.href='results.html'">View Results</button>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/candidates');
                const candidates = await response.json();

                container.innerHTML = '';
                candidates.forEach(cand => {
                    const card = document.createElement('div');
                    card.className = 'card candidate-card';
                    card.innerHTML = `
                        <div class="candidate-img">
                            <img src="..${cand.photo}" alt="${cand.name}" onerror="this.innerHTML='<i class=\"fas fa-user\"></i>'">
                        </div>
                        <h3 class="candidate-name">${cand.name}</h3>
                        <p class="manifesto">${cand.manifesto}</p>
                        <button class="btn-sleek vote-btn" style="width: 100%; margin-top: 1rem;" data-id="${cand.id}">Vote for ${cand.name.split(' ')[0]}</button>
                    `;
                    container.appendChild(card);
                });

                // Attach vote events
                document.querySelectorAll('.vote-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const candidate_id = btn.getAttribute('data-id');
                        if (confirm('Are you sure you want to cast your vote for this candidate? This action cannot be undone.')) {
                            await submitVote(candidate_id);
                        }
                    });
                });

            } catch (err) {
                container.innerHTML = '<p>Error loading candidates.</p>';
            }
        });

        async function submitVote(candidate_id) {
            const user = JSON.parse(localStorage.getItem('user'));
            try {
                const res = await fetch('http://localhost:3000/api/vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        studentId: user.student_id, 
                        candidateId: parseInt(candidate_id) 
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    user.has_voted = 1;
                    localStorage.setItem('user', JSON.stringify(user));
                    alert('Vote cast successfully!');
                    window.location.href = 'results.html';
                } else {
                    alert(data.error || 'Failed to cast vote');
                }
            } catch (err) {
                alert('Failed to submit vote.');
            }
        }
    </script>
</body>
</html>
