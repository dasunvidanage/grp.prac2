<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    
    <div class="sleek-card" style="max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 80px; height: 80px; background: white; border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); overflow: hidden; padding: 0.5rem;">
                <img src="../assets/images/UCSC_logo.png" alt="UCSC Logo" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 800; color: #1e293b; letter-spacing: -0.025em; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="color: #64748b; font-weight: 500;">Join the UCSC Election Portal</p>
        </div>

        <form id="register-form">
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" class="sleek-input" placeholder="Full Name" required>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" class="sleek-input" placeholder="Email Address" required>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-id-card"></i>
                <input type="text" id="reg-student-id" class="sleek-input" placeholder="Student ID (e.g. 2026CS003)" required>
            </div>
            
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" class="sleek-input" placeholder="Password" required>
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.75rem;">Upload Student ID Photo</label>
                <div id="id-preview-container" style="width: 100%; height: 150px; background: #f8fafc; border-radius: 1rem; border: 2px dashed #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; overflow: hidden; position: relative;" onclick="document.getElementById('reg-id-photo').click()">
                    <i class="fas fa-id-badge" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                    <span style="font-size: 0.8rem; font-weight: 500;">Click to upload ID</span>
                    <img id="id-preview-img" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; display: none; background: #f8fafc;">
                </div>
                <input type="file" id="reg-id-photo" accept="image/*" style="display: none;" required>
            </div>

            <button type="submit" class="btn-sleek">
                Register <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <p style="color: #64748b; font-size: 0.875rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        let selectedIdPhoto = "";

        document.getElementById('reg-id-photo').onchange = function(e) {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('id-preview-img').src = event.target.result;
                    document.getElementById('id-preview-img').style.display = 'block';
                    selectedIdPhoto = event.target.result;
                }
                reader.readAsDataURL(this.files[0]);
            }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            
            if (!selectedIdPhoto) {
                alert('Please upload your Student ID photo.');
                return;
            }

            const payload = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                student_id: document.getElementById('reg-student-id').value,
                password: document.getElementById('reg-password').value,
                id_photo: selectedIdPhoto
            };

            try {
                console.log('Sending registration request:', payload);
                const res = await fetch('http://127.0.0.1:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                if (res.ok) {
                    alert(data.message);
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (err) {
                console.error('Registration error details:', err);
                alert('An error occurred during registration.');
            }
        };
    </script>
</body>
</html>
