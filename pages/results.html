<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../js/highcharts.js"></script>
    <script src="../js/highcharts-3d.js"></script>
    <style>
        .results-container {
            width: 100%;
        }

        .election-selector-box {
            background: white;
            padding: 1.25rem 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #f1f5f9;
        }

        .select-modern {
            padding: 0.625rem 1rem;
            border-radius: 0.75rem;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            min-width: 320px;
            outline: none;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .select-modern:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .overview-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border: 1px solid #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        .overview-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .election-title-main {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-active { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-upcoming { background: #fef3c7; color: #92400e; }

        .pulse-dot-results {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-results 1.5s infinite;
        }

        @keyframes pulse-results {
            0% { transform: scale(0.95); opacity: 1; }
            70% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        .results-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .stat-modern-box {
            background: #f8fafc;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid #f1f5f9;
            transition: all 0.2s;
        }

        .stat-modern-box:hover {
            background: white;
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .stat-label-modern {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .stat-value-modern {
            font-size: 1.35rem;
            font-weight: 800;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .position-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .position-header-modern {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .position-icon-box {
            width: 40px;
            height: 40px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .position-title-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1e293b;
        }

        .layout-grid-modern {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 1100px) {
            .layout-grid-modern { grid-template-columns: 1fr; gap: 2rem; }
            .election-selector-box { flex-direction: column; align-items: stretch; padding: 1.5rem; }
            .select-modern { min-width: unset; }
        }

        .candidate-result-item-modern {
            margin-bottom: 1.5rem;
        }

        .candidate-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .candidate-info-group {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .candidate-pfp-mini {
            width: 40px;
            height: 40px;
            border-radius: 0.75rem;
            background: #f1f5f9;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .candidate-name-text {
            font-weight: 700;
            color: #1e293b;
            font-size: 1rem;
        }

        .vote-count-badge {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .progress-track-modern {
            height: 10px;
            background: #f1f5f9;
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill-modern {
            height: 100%;
            border-radius: 99px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(90deg, var(--primary), #818cf8);
        }

        .percentage-label-float {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            margin-top: 0.375rem;
            text-align: right;
            display: block;
        }

        .leading-indicator {
            background: #dcfce7;
            color: #166534;
            padding: 0.25rem 0.625rem;
            border-radius: 0.5rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-left: 0.75rem;
        }

        .no-data-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 1rem;
            border: 2px dashed #f1f5f9;
        }

        .no-data-icon {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="dashboard-body">
    
    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>ELECTION RESULTS</h1>
                <p>Live voting analytics & candidate distribution</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span id="user-id" class="user-id">ID: Loading...</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-graduate"></i>
                </div>
            </div>
        </header>

        <div class="results-container">
            <div class="election-selector-box">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="stat-icon" style="background: #eff6ff; color: #3b82f6; width: 40px; height: 40px; font-size: 1rem;">
                        <i class="fas fa-filter"></i>
                    </div>
                    <label for="election-id" style="font-weight: 700; color: #1e293b;">Select Election:</label>
                    <select id="election-id" class="select-modern">
                        <option value="" disabled selected>Select an Election</option>
                    </select>
                </div>
            </div>

            <div id="results-content" style="display: none;">
                <div class="overview-card">
                    <div class="overview-header">
                        <div>
                            <h2 id="erc-election-title" class="election-title-main">Loading Election...</h2>
                            <div class="status-container">
                                <div id="erc-status-badge" class="status-pill">
                                    <div class="pulse-dot-results"></div>
                                    <span>--</span>
                                </div>
                                <span id="erc-position-subtitle" style="font-size: 0.9rem; color: #64748b; font-weight: 500;">Fetching status...</span>
                            </div>
                        </div>
                    </div>

                    <div class="results-stats-grid">
                        <div class="stat-modern-box">
                            <span class="stat-label-modern">Total Verified Votes</span>
                            <div class="stat-value-modern">
                                <i class="fas fa-check-circle" style="color: var(--success); font-size: 1.25rem;"></i>
                                <span id="erc-total-votes">0</span>
                            </div>
                        </div>
                        <div class="stat-modern-box">
                            <span class="stat-label-modern">Time Remaining</span>
                            <div class="stat-value-modern">
                                <i class="fas fa-clock" style="color: var(--primary); font-size: 1.25rem;"></i>
                                <span id="erc-time-left">--:--:--</span>
                            </div>
                        </div>
                        <div class="stat-modern-box">
                            <span class="stat-label-modern">Live Accuracy</span>
                            <div class="stat-value-modern">
                                <i class="fas fa-shield-alt" style="color: #3b82f6; font-size: 1.25rem;"></i>
                                <span>100%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="positions-container">
                    <!-- Position-wise results injected here -->
                </div>
            </div>

            <div id="no-election-msg" class="no-data-state">
                <div class="no-data-icon">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 0.75rem;">Waiting for Selection</h3>
                <p style="color: #64748b; font-weight: 500;">Select an election from the menu above to visualize live voting data.</p>
            </div>
        </div>
    </main>

    <script src="../js/sidebar.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        const designColors = ['#6366f1', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#3b82f6'];
        let electionId = null;
        let electionData = null;
        let refreshInterval = null;

        async function init() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.student_id) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('user-name').textContent = user.name || 'Student';
            document.getElementById('user-id').textContent = 'ID: ' + (user.student_id || 'N/A');

            await loadElections();

            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('election_id') || urlParams.get('id');
            if (idParam) {
                document.getElementById('election-id').value = idParam;
                handleElectionChange(idParam);
            }

            document.getElementById('election-id').onchange = (e) => {
                handleElectionChange(e.target.value);
            };

            setInterval(updateCountdown, 1000);
        }

        async function loadElections() {
            try {
                const res = await fetch(`${API_BASE}/elections`);
                const elections = await res.json();
                const filter = document.getElementById('election-id');
                filter.innerHTML = '<option value="" disabled selected>Select an Election</option>' + 
                    elections.map(e => `<option value="${e.id}">${e.title}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        function handleElectionChange(id) {
            electionId = id;
            if (refreshInterval) clearInterval(refreshInterval);
            
            if (!id) {
                document.getElementById('results-content').style.display = 'none';
                document.getElementById('no-election-msg').style.display = 'block';
                return;
            }

            document.getElementById('results-content').style.display = 'block';
            document.getElementById('no-election-msg').style.display = 'none';

            fetchAllData();
            refreshInterval = setInterval(fetchAllData, 10000);
        }

        async function fetchAllData() {
            if (!electionId) return;
            try {
                const [electionRes, resultsRes] = await Promise.all([
                    fetch(`${API_BASE}/elections/${electionId}`),
                    fetch(`${API_BASE}/results?election_id=${electionId}`)
                ]);

                if (electionRes.ok && resultsRes.ok) {
                    electionData = await electionRes.json();
                    const results = await resultsRes.json();
                    renderUI(electionData, results);
                }
            } catch (err) {
                console.error('Error fetching data:', err);
            }
        }

        function renderUI(election, results) {
            document.getElementById('erc-election-title').textContent = election.title;
            const totalVotes = results.reduce((sum, r) => sum + r.vote_count, 0);
            document.getElementById('erc-total-votes').textContent = totalVotes.toLocaleString();
            
            const statusBadge = document.getElementById('erc-status-badge');
            const statusText = statusBadge.querySelector('span');
            statusText.textContent = election.status.toUpperCase();
            statusBadge.className = `status-pill status-${election.status}`;
            
            document.getElementById('erc-position-subtitle').textContent = `The election is currently ${election.status}.`;

            const grouped = {};
            results.forEach(r => {
                if (!grouped[r.position]) grouped[r.position] = [];
                grouped[r.position].push(r);
            });

            const container = document.getElementById('positions-container');
            container.innerHTML = '';

            Object.entries(grouped).forEach(([position, candidates], index) => {
                const posId = `pos-${index}`;
                const section = document.createElement('div');
                section.className = 'position-card';
                section.innerHTML = `
                    <div class="position-header-modern">
                        <div class="position-icon-box"><i class="fas fa-award"></i></div>
                        <h3 class="position-title-text">${position}</h3>
                    </div>
                    <div class="layout-grid-modern">
                        <div id="${posId}-chart" style="height: 380px;"></div>
                        <div id="${posId}-list"></div>
                    </div>
                `;
                container.appendChild(section);

                renderPieChart(`${posId}-chart`, position, candidates);
                renderCandidateList(`${posId}-list`, candidates);
            });
        }

        function renderPieChart(containerId, title, candidates) {
            const data = candidates.map((c, i) => ({
                name: c.name,
                y: c.vote_count,
                color: designColors[i % designColors.length]
            }));

            Highcharts.chart(containerId, {
                chart: {
                    type: 'pie',
                    options3d: { enabled: true, alpha: 45, beta: 0 },
                    backgroundColor: 'transparent'
                },
                title: { text: '' },
                tooltip: { 
                    headerFormat: '',
                    pointFormat: '<span style="color:{point.color}">\u25CF</span> {point.name}: <b>{point.y}</b> ({point.percentage:.1f}%)' 
                },
                plotOptions: {
                    pie: {
                        allowPointSelect: true,
                        cursor: 'pointer',
                        depth: 35,
                        innerSize: '60%',
                        dataLabels: {
                            enabled: true,
                            format: '{point.percentage:.1f}%',
                            style: { fontWeight: '800', fontSize: '12px' },
                            distance: -30,
                            color: 'white'
                        },
                        showInLegend: true
                    }
                },
                legend: {
                    itemStyle: { color: '#1e293b', fontWeight: '600', fontSize: '11px' },
                    layout: 'vertical',
                    align: 'right',
                    verticalAlign: 'middle'
                },
                series: [{ name: 'Votes', data: data }],
                credits: { enabled: false }
            });
        }

        function renderCandidateList(containerId, candidates) {
            const sorted = [...candidates].sort((a,b) => b.vote_count - a.vote_count);
            const container = document.getElementById(containerId);
            const totalPosVotes = sorted.reduce((s, c) => s + c.vote_count, 0);

            container.innerHTML = sorted.map((c, i) => {
                const isLeading = i === 0 && c.vote_count > 0;
                const pct = totalPosVotes > 0 ? ((c.vote_count / totalPosVotes) * 100).toFixed(1) : 0;
                const color = designColors[candidates.indexOf(c) % designColors.length];
                
                return `
                    <div class="candidate-result-item-modern">
                        <div class="candidate-meta-row">
                            <div class="candidate-info-group">
                                <div class="erc-avatar" style="background: ${color}20; color: ${color}; width: 40px; height: 40px; font-size: 0.9rem;">
                                    ${c.name.charAt(0)}
                                </div>
                                <div>
                                    <span class="candidate-name-text">${c.name}</span>
                                    ${isLeading ? '<span class="leading-indicator"><i class="fas fa-crown"></i> Leading</span>' : ''}
                                </div>
                            </div>
                            <span class="vote-count-badge">${c.vote_count.toLocaleString()}</span>
                        </div>
                        <div class="progress-track-modern">
                            <div class="progress-fill-modern" style="width: ${pct}%; background: ${color};"></div>
                        </div>
                        <span class="percentage-label-float">${pct}% of total votes</span>
                    </div>
                `;
            }).join('');
        }

        function updateCountdown() {
            const timerEl = document.getElementById('erc-time-left');
            if (!electionData || !electionData.end_time) return;

            const end = new Date(electionData.end_time).getTime();
            const now = new Date().getTime();
            const dist = end - now;

            if (dist < 0) {
                timerEl.textContent = 'ENDED';
                return;
            }

            const hours = Math.floor(dist / (1000 * 60 * 60));
            const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((dist % (1000 * 60)) / 1000);

            timerEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
