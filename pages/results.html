<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <img src="../assets/images/UCSC_logo.png" alt="UCSC Logo">
            </div>
            <span>UCSC Portal</span>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="admin-dashboard.html" class="nav-link admin-only" style="display: none;">
                <i class="fas fa-user-shield"></i>
                <span>Admin</span>
            </a>
            <a href="vote.html" class="nav-link">
                <i class="fas fa-vote-yea"></i>
                <span>Cast Vote</span>
            </a>
            <a href="results.html" class="nav-link active">
                <i class="fas fa-chart-bar"></i>
                <span>Live Results</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="logout-btn" class="nav-link logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Live Election Results</h1>
                <p>Real-time standings for the election</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="user-role">Student</span>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <div class="card">
            <div id="results-container" style="margin-bottom: 2rem;">
                <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Presidential Category</h3>
                <p>Loading results...</p>
            </div>

            <div style="padding-top: 1.5rem; border-top: 1px solid #f1f5f9; text-align: center;">
                <p id="total-votes-text" style="color: var(--text-muted); font-size: 0.9rem;">
                    <i class="fas fa-info-circle"></i> Results are updated in real-time.
                </p>
            </div>
        </div>
    </main>

    <script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchResults);

        async function fetchResults() {
            const container = document.getElementById('results-container');
            const totalText = document.getElementById('total-votes-text');

            try {
                const response = await fetch('http://127.0.0.1:3000/api/results');
                const results = await response.json();

                const totalVotes = results.reduce((sum, r) => sum + r.vote_count, 0);
                totalText.innerHTML = `<i class="fas fa-info-circle"></i> Results are updated in real-time. Total votes cast: ${totalVotes}`;

                container.innerHTML = '<h3 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Presidential Category</h3>';
                
                results.forEach(res => {
                    const percentage = totalVotes > 0 ? ((res.vote_count / totalVotes) * 100).toFixed(1) : 0;
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <div class="result-info">
                            <span>${res.name}</span>
                            <span>${res.vote_count} Votes (${percentage}%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percentage}%;"></div>
                        </div>
                    `;
                    container.appendChild(item);
                });

            } catch (err) {
                container.innerHTML = '<p>Error loading results.</p>';
            }
        }
    </script>
</body>
</html>
