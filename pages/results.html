<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-3d.js"></script>
</head>
<body class="dashboard-body">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <img src="../assets/images/UCSC_logo.png" alt="UCSC Logo">
            </div>
            <span>UCSC Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="vote.html" class="nav-link">
                <i class="fas fa-vote-yea"></i>
                <span>Cast Vote</span>
            </a>
            <a href="results.html" class="nav-link active">
                <i class="fas fa-chart-bar"></i>
                <span>Results</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logout-btn" class="nav-link logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>ELECTION RESULTS</h1>
                <p>Real-time voting analytics & distribution</p>
            </div>
        </header>

        <!-- Live Election Results Card -->
        <div class="election-results-card">
            <div class="erc-header">
                <div class="erc-title-group">
                    <h2 id="erc-election-title">Rotaract Club — Board Elections 2025</h2>
                    <p id="erc-position-subtitle">President position · Voting in progress</p>
                </div>
                <div id="erc-status-badge" class="erc-status-badge">
                    <div class="erc-pulse-dot"></div>
                    <span>Live</span>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="erc-stats-row">
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Total votes</span>
                    <span id="erc-total-votes" class="erc-stat-value">0</span>
                </div>
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Turnout</span>
                    <span id="erc-turnout" class="erc-stat-value">0%</span>
                </div>
                <div class="erc-stat-box">
                    <span class="erc-stat-label">Time left</span>
                    <span id="erc-time-left" class="erc-stat-value">--:--:--</span>
                </div>
            </div>

            <div class="erc-body-grid">
                <!-- Left Column: Candidates -->
                <div class="erc-candidates-column">
                    <span class="erc-section-label">Candidates</span>
                    <div id="erc-candidates-list" class="erc-candidates-list">
                        <!-- Candidates injected here -->
                    </div>
                </div>

                <!-- Right Column: Pie Chart -->
                <div class="erc-pie-column">
                    <span class="erc-section-label">Vote share</span>
                    <div id="erc-pie-chart-container" style="height: 220px;"></div>
                    <div id="erc-chart-legend" class="erc-chart-legend">
                        <!-- Legend injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        const designColors = ['#378ADD', '#7F77DD', '#1D9E75', '#EF9F27'];
        const avatarClasses = ['blue', 'purple', 'teal', 'amber'];
        let electionDeadline = null;
        let isVotingOpen = false;

        async function fetchResults() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const studentId = user.student_id || user.id || "";
                
                const fetchOptions = { credentials: 'include' };
                
                const [settingsRes, resultsRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/settings`, fetchOptions),
                    fetch(`${API_BASE}/results`, fetchOptions)
                ]);

                if (!settingsRes.ok || !resultsRes.ok) {
                    throw new Error('Failed to fetch basic data');
                }

                const settings = await settingsRes.json();
                const results = await resultsRes.json();

                // Store for the 1s interval timer
                electionDeadline = settings.voting_deadline;
                isVotingOpen = settings.voting_open === '1';

                let totalStudents = 100;
                if (user.role === 'admin') {
                    try {
                        const studentsRes = await fetch(`${API_BASE}/admin/students`, {
                            ...fetchOptions,
                            headers: { 'x-admin-id': studentId }
                        });
                        if (studentsRes.ok) {
                            const students = await studentsRes.json();
                            totalStudents = students.length;
                        }
                    } catch (e) { console.warn('Turnout calc fallback used'); }
                }

                renderERC(settings, results, totalStudents);
            } catch (err) { 
                console.error('Error fetching results:', err); 
            }
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function renderERC(settings, results, totalStudents) {
            const totalVotes = results.reduce((sum, r) => sum + r.vote_count, 0);
            const turnout = totalStudents > 0 ? ((totalVotes / totalStudents) * 100).toFixed(0) : 0;
            
            document.getElementById('erc-total-votes').textContent = totalVotes;
            document.getElementById('erc-turnout').textContent = turnout + '%';
            
            // Update Status Badge
            const statusBadge = document.getElementById('erc-status-badge');
            const isOpen = settings.voting_open === '1';
            const deadline = new Date(settings.voting_deadline).getTime();
            const now = new Date().getTime();
            const isEnded = deadline - now < 0;

            if (!isOpen) {
                statusBadge.innerHTML = '<span>Results pending</span>';
                statusBadge.style.background = '#FAEEDA';
                statusBadge.style.color = '#854F0B';
            } else if (isEnded) {
                statusBadge.innerHTML = '<span>Final results</span>';
                statusBadge.style.background = '#EAF3DE';
                statusBadge.style.color = '#3B6D11';
            } else {
                statusBadge.innerHTML = '<div class="erc-pulse-dot"></div><span>Live</span>';
                statusBadge.style.background = '#FCEBEB';
                statusBadge.style.color = '#A32D2D';
            }

            // Render Candidates List
            const listContainer = document.getElementById('erc-candidates-list');
            const sorted = [...results].sort((a,b) => b.vote_count - a.vote_count);
            
            listContainer.innerHTML = sorted.map((c, i) => {
                const pct = totalVotes > 0 ? ((c.vote_count / totalVotes) * 100).toFixed(0) : 0;
                const isLeading = i === 0 && c.vote_count > 0;
                const color = designColors[i % designColors.length];
                const avatarClass = avatarClasses[i % avatarClasses.length];
                
                return `
                    <div class="erc-candidate-item">
                        <div class="erc-avatar ${avatarClass}">
                            ${getInitials(c.name)}
                        </div>
                        <div class="erc-candidate-info">
                            <div class="erc-candidate-header">
                                <div class="erc-candidate-name-group">
                                    <span class="erc-candidate-name">${c.name}</span>
                                    ${isLeading ? '<span class="erc-leading-badge">Leading</span>' : ''}
                                </div>
                                <span class="erc-percentage-label" style="color: ${color}">${pct}%</span>
                            </div>
                            <div class="erc-progress-track">
                                <div class="erc-progress-fill" style="width: ${pct}%; background: ${color}"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Render Chart
            renderChart(results);
            runCountdown(); // Initial update
        }

        function renderChart(results) {
            const chartData = results.map((r, i) => ({
                name: r.name,
                y: r.vote_count,
                color: designColors[i % designColors.length]
            }));

            Highcharts.chart('erc-pie-chart-container', {
                chart: { 
                    type: 'pie', 
                    options3d: { 
                        enabled: true, 
                        alpha: 45, 
                        beta: 0 
                    }, 
                    backgroundColor: 'transparent',
                    height: 220
                },
                title: { text: null },
                plotOptions: {
                    pie: { 
                        depth: 35, 
                        dataLabels: { enabled: false }, 
                        showInLegend: false, 
                        innerSize: '0%',
                        borderWidth: 2,
                        borderColor: '#FFFFFF'
                    }
                },
                series: [{ 
                    name: 'Votes', 
                    data: chartData 
                }],
                credits: { enabled: false }
            });

            // Legend
            const total = results.reduce((s,r)=>s+r.vote_count,0);
            document.getElementById('erc-chart-legend').innerHTML = results.map((r,i) => {
                const pct = total > 0 ? ((r.vote_count / total) * 100).toFixed(0) : 0;
                return `
                    <div class="erc-legend-item">
                        <div class="erc-legend-left">
                            <div class="erc-swatch" style="background: ${designColors[i % designColors.length]}"></div>
                            <span>${r.name}</span>
                        </div>
                        <span>${pct}%</span>
                    </div>
                `;
            }).join('');
        }

        function runCountdown() {
            const timerEl = document.getElementById('erc-time-left');
            if (!isVotingOpen || !electionDeadline) {
                timerEl.textContent = 'CLOSED';
                return;
            }
            const deadline = new Date(electionDeadline).getTime();
            const now = new Date().getTime();
            const dist = deadline - now;
            if (dist < 0) {
                timerEl.textContent = 'ENDED';
                return;
            }
            
            const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((dist % (1000 * 60)) / 1000);
            
            timerEl.textContent = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchResults();
            setInterval(fetchResults, 30000); // Poll data every 30s
            setInterval(runCountdown, 1000);  // Update clock every 1s
        });
    </script>
</body>
</html>
