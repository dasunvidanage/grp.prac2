<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard - UCSC Election Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-3d.js"></script>
    <style>
        .leading-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="dashboard-body dark-dashboard">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <img src="../assets/images/UCSC_logo.png" alt="UCSC Logo">
            </div>
            <span>UCSC Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="vote.html" class="nav-link">
                <i class="fas fa-vote-yea"></i>
                <span>Cast Vote</span>
            </a>
            <a href="results.html" class="nav-link active">
                <i class="fas fa-chart-bar"></i>
                <span>Results</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logout-btn" class="nav-link logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>ELECTION RESULTS</h1>
                <p style="color: var(--dark-muted)">Real-time voting analytics & distribution</p>
            </div>
        </header>

        <!-- Top Row: Summary Cards -->
        <div class="stats-grid" style="margin-bottom: 2rem;">
            <div class="card" style="text-align: center;">
                <span class="stat-mini-label">TOTAL VOTES</span>
                <span id="total-votes" class="stat-mini-value" style="font-size: 2rem;">0</span>
            </div>
            <div class="card" style="text-align: center;">
                <span class="stat-mini-label">TURNOUT PERCENTAGE</span>
                <span id="turnout-pct" class="stat-mini-value" style="font-size: 2rem;">0%</span>
            </div>
            <div class="card" style="text-align: center;">
                <span class="stat-mini-label">TIME LEFT</span>
                <span id="time-left" class="stat-mini-value" style="font-size: 2rem; color: var(--primary);">00:00:00</span>
            </div>
        </div>

        <div class="two-column-grid">
            <!-- Left Column: Candidates -->
            <div class="card" style="padding: 2rem;">
                <h3 style="font-size: 0.875rem; letter-spacing: 0.1em; color: var(--dark-muted); margin-bottom: 2rem;">CANDIDATES</h3>
                <div id="candidates-list">
                    <!-- Progress bar list rows injected here -->
                </div>
            </div>

            <!-- Right Column: Vote Share -->
            <div class="card" style="padding: 2rem;">
                <h3 style="font-size: 0.875rem; letter-spacing: 0.1em; color: var(--dark-muted); margin-bottom: 2rem; text-align: center;">VOTE SHARE</h3>
                <div id="results-pie-container" style="height: 350px;"></div>
                <div id="chart-legend" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <!-- Legend items here -->
                </div>
            </div>
        </div>
    </main>

    <script src="../js/script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        const hexRamp = ['#6366f1', '#8b5cf6', '#14b8a6', '#f59e0b', '#fb7185', '#ec4899'];

        async function fetchResults() {
            try {
                const [settingsRes, resultsRes, studentsRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/settings`, { credentials: 'include' }),
                    fetch(`${API_BASE}/results`, { credentials: 'include' }),
                    fetch(`${API_BASE}/admin/students`, { credentials: 'include' })
                ]);

                const settings = await settingsRes.json();
                const results = await resultsRes.json();
                const students = await studentsRes.json();

                renderDashboard(settings, results, students.length);
            } catch (err) { console.error(err); }
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function renderDashboard(settings, results, totalStudents) {
            const totalVotes = results.reduce((sum, r) => sum + r.vote_count, 0);
            const turnout = totalStudents > 0 ? ((totalVotes / totalStudents) * 100).toFixed(1) : 0;
            
            document.getElementById('total-votes').textContent = totalVotes;
            document.getElementById('turnout-pct').textContent = turnout + '%';
            
            // Render Candidates List
            const listContainer = document.getElementById('candidates-list');
            const sorted = [...results].sort((a,b) => b.vote_count - a.vote_count);
            
            listContainer.innerHTML = sorted.map((c, i) => {
                const pct = totalVotes > 0 ? ((c.vote_count / totalVotes) * 100).toFixed(1) : 0;
                const isLeading = i === 0 && c.vote_count > 0;
                const color = hexRamp[i % hexRamp.length];
                
                return `
                    <div class="candidate-result-row" style="display: flex; align-items: center; gap: 1.5rem; padding: 1.25rem 0; border-bottom: 1px solid #222;">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: #222; border: 2px solid ${color}; display: flex; align-items: center; justify-content: center; font-weight: 700; color: ${color}; flex-shrink: 0;">
                            ${getInitials(c.name)}
                        </div>
                        <div style="flex-grow: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                                <div style="display: flex; align-items: center; gap: 0.75rem;">
                                    <span style="font-weight: 600; font-size: 1rem;">${c.name}</span>
                                    ${isLeading ? '<span class="leading-badge">LEADING</span>' : ''}
                                </div>
                                <span style="font-weight: 700; color: ${color};">${pct}%</span>
                            </div>
                            <div class="progress-bar-bg" style="height: 6px; border-radius: 3px;">
                                <div class="progress-bar-fill" style="width: ${pct}%; background: ${color}; height: 100%; border-radius: 3px;"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Render Chart
            renderChart(results);
            updateTimer(settings.voting_deadline, settings.voting_open === '1');
        }

        function renderChart(results) {
            const chartData = results.map((r, i) => ({
                name: r.name,
                y: r.vote_count,
                color: hexRamp[i % hexRamp.length]
            }));

            Highcharts.chart('results-pie-container', {
                chart: { type: 'pie', options3d: { enabled: true, alpha: 45, beta: 0 }, backgroundColor: 'transparent' },
                title: { text: null },
                plotOptions: {
                    pie: { depth: 35, dataLabels: { enabled: false }, showInLegend: false, innerSize: '40%' }
                },
                series: [{ name: 'Votes', data: chartData }],
                credits: { enabled: false }
            });

            // Legend
            const total = results.reduce((s,r)=>s+r.vote_count,0);
            document.getElementById('chart-legend').innerHTML = results.map((r,i) => {
                const pct = total > 0 ? ((r.vote_count / total) * 100).toFixed(1) : 0;
                return `
                    <div style="display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <div style="width: 10px; height: 10px; border-radius: 50%; background: ${hexRamp[i % hexRamp.length]}"></div>
                            <span>${r.name}</span>
                        </div>
                        <span style="color: var(--dark-muted)">${pct}%</span>
                    </div>
                `;
            }).join('');
        }

        function updateTimer(deadlineStr, isOpen) {
            const timerEl = document.getElementById('time-left');
            if (!isOpen) {
                timerEl.textContent = 'CLOSED';
                return;
            }
            const deadline = new Date(deadlineStr).getTime();
            const now = new Date().getTime();
            const dist = deadline - now;
            if (dist < 0) {
                timerEl.textContent = 'ENDED';
                return;
            }
            const h = Math.floor(dist / (1000 * 60 * 60));
            const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((dist % (1000 * 60)) / 1000);
            timerEl.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchResults();
            setInterval(fetchResults, 10000);
        });
    </script>
</body>
</html>
